name: build & release

# Builds rakupp on all three target platforms and, when a v* tag is pushed,
# attaches the packaged binaries to a GitHub Release.
#   - macOS   : universal binary (arm64 + x86_64), Apple Clang
#   - Linux   : x86_64, GCC, statically linked libstdc++/libgcc for portability
#   - Windows : x64, native MSVC
# On push/PR to main it just builds + smoke-tests (no release), so portability
# regressions surface immediately.

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the Release on a tag

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macos-universal }
          - { os: ubuntu-latest,  name: linux-x86_64 }
          - { os: windows-latest, name: windows-x64 }
    steps:
      - uses: actions/checkout@v7

      # Deployment target 11.0 = Big Sur, the first Apple Silicon macOS: the
      # artifact runs on any Mac from 2020 on, regardless of which macOS the
      # runner image happens to be (macos-latest rotates, e.g. to macOS 26 —
      # without this pin the binary's minimum OS would silently drift up).
      - name: Configure (macOS universal)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      # Clang, not GCC: on rakupp's tree-walker Clang -O3 measures 1.2-2.0x
      # faster than GCC across the whole bench suite (fib +28%, loopsum +46%;
      # measured on arm64 with Clang 17 vs GCC 16.1, LTO/-mcpu=native change
      # nothing). GCC portability is still guarded by a local GCC build.
      - name: Configure (Linux, Clang, static libstdc++)
        if: runner.os == 'Linux'
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_EXE_LINKER_FLAGS=-static-libgcc -static-libstdc++"

      # No pinned -G: windows-latest rotates its Visual Studio version (2022 is
      # already gone); CMake's default generator picks whatever VS is installed.
      # MultiThreaded = static CRT (/MT): the exe carries its own C++ runtime,
      # so users don't need the VC++ Redistributable (msvcp140.dll) installed —
      # same self-contained philosophy as the static libstdc++ on Linux.
      - name: Configure (Windows, MSVC x64)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        run: build/rakupp tools/smoke.raku

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: build\Release\rakupp.exe tools/smoke.raku

      # Package the --exe-capable install layout: bin/rakupp, lib/librakupp_rt.a,
      # include/rakupp/*.h (main.cpp's findRuntime() expects exactly this).
      - name: Install layout
        run: cmake --install build --config Release --prefix dist/rakupp

      - name: Package (POSIX)
        if: runner.os != 'Windows'
        run: |
          cp README.md LICENSE dist/rakupp/ 2>/dev/null || true
          tar -C dist -czf rakupp-${{ matrix.name }}.tar.gz rakupp
          if command -v shasum >/dev/null; then
            shasum -a 256 rakupp-${{ matrix.name }}.tar.gz > rakupp-${{ matrix.name }}.tar.gz.sha256
          else
            sha256sum rakupp-${{ matrix.name }}.tar.gz > rakupp-${{ matrix.name }}.tar.gz.sha256
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item README.md,LICENSE dist\rakupp\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\rakupp\* -DestinationPath rakupp-${{ matrix.name }}.zip
          (Get-FileHash rakupp-${{ matrix.name }}.zip -Algorithm SHA256).Hash | Out-File -Encoding ascii rakupp-${{ matrix.name }}.zip.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: rakupp-${{ matrix.name }}
          path: rakupp-${{ matrix.name }}.*
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: rakupp-${{ matrix.name }}.*

  # The Linux release binary above is built with Clang (faster); this job keeps
  # GCC compiling cleanly too — it's what most Linux users' `cmake --build` uses.
  gcc-portability:
    name: linux-gcc (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure (GCC)
        env: { CC: gcc, CXX: g++ }
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j 4
      - name: Smoke test
        run: build/rakupp tools/smoke.raku
