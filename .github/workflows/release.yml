name: build & release

# Builds rakupp on all three target platforms and, when a v* tag is pushed,
# attaches the packaged binaries to a GitHub Release.
#   - macOS   : universal binary (arm64 + x86_64), Apple Clang
#   - Linux   : x86_64, GCC, statically linked libstdc++/libgcc for portability
#   - Windows : x64, native MSVC
# The `wasm` job additionally attaches the Raku.js WebAssembly build (playground
# bundle + ready-to-open browser showcases) so users don't need Emscripten.
# On push/PR to main it just builds + smoke-tests (no release), so portability
# regressions surface immediately.

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the Release on a tag

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macos-universal }
          - { os: ubuntu-latest,  name: linux-x86_64 }
          - { os: windows-latest, name: windows-x64 }
          - { os: windows-latest, name: windows-x64-mingw, mingw: true }
    steps:
      - uses: actions/checkout@v7

      # Deployment target 11.0 = Big Sur, the first Apple Silicon macOS: the
      # artifact runs on any Mac from 2020 on, regardless of which macOS the
      # runner image happens to be (macos-latest rotates, e.g. to macOS 26 —
      # without this pin the binary's minimum OS would silently drift up).
      - name: Configure (macOS universal)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      # Clang, not GCC: on rakupp's tree-walker Clang -O3 measures 1.2-2.0x
      # faster than GCC across the whole bench suite (fib +28%, loopsum +46%;
      # measured on arm64 with Clang 17 vs GCC 16.1, LTO/-mcpu=native change
      # nothing). GCC portability is still guarded by a local GCC build.
      - name: Configure (Linux, Clang, static libstdc++)
        if: runner.os == 'Linux'
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_EXE_LINKER_FLAGS=-static-libgcc -static-libstdc++"

      # No pinned -G: windows-latest rotates its Visual Studio version (2022 is
      # already gone); CMake's default generator picks whatever VS is installed.
      # MultiThreaded = static CRT (/MT): the exe carries its own C++ runtime,
      # so users don't need the VC++ Redistributable (msvcp140.dll) installed —
      # same self-contained philosophy as the static libstdc++ on Linux.
      - name: Configure (Windows, MSVC x64)
        if: runner.os == 'Windows' && matrix.mingw != true
        run: cmake -S . -B build -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      # MinGW-w64 (GCC) Windows build — the GNU toolchain MSYS2 users have,
      # and what `--exe` invokes there (g++ on PATH). -static bundles
      # libstdc++/libgcc/winpthread so the exe is as self-contained as the
      # /MT MSVC build. The runtime archive is librakupp_rt.a here (the
      # --exe lookup accepts both namings).
      - name: Set up MSYS2 (MinGW-w64)
        if: matrix.mingw == true
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake make

      - name: Configure (Windows, MinGW-w64)
        if: matrix.mingw == true
        shell: msys2 {0}
        run: cmake -S . -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release "-DCMAKE_EXE_LINKER_FLAGS=-static"

      - name: Build
        if: matrix.mingw != true
        run: cmake --build build --config Release -j 4

      - name: Build (MinGW-w64)
        if: matrix.mingw == true
        shell: msys2 {0}
        run: cmake --build build -j 4

      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        run: build/rakupp tools/smoke.raku

      - name: Smoke test (Windows)
        if: runner.os == 'Windows' && matrix.mingw != true
        run: build\Release\rakupp.exe tools/smoke.raku

      - name: Smoke test (Windows, MinGW-w64)
        if: matrix.mingw == true
        shell: msys2 {0}
        run: build/rakupp.exe tools/smoke.raku

      # --exe end-to-end: compile the (self-checking) smoke test to a native
      # binary with the platform's own C++ toolchain, then run it. Exercises
      # the runtime-library lookup, the compile-driver dialect, and the
      # linked product on every platform (github issue #1).
      - name: Smoke test --exe (POSIX)
        if: runner.os != 'Windows'
        run: |
          build/rakupp --exe tools/smoke.raku -o smoke-native
          ./smoke-native

      - name: MSVC compiler environment (for --exe)
        if: runner.os == 'Windows' && matrix.mingw != true
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Smoke test --exe (Windows, MSVC)
        if: runner.os == 'Windows' && matrix.mingw != true
        shell: pwsh
        run: |
          build\Release\rakupp.exe --exe tools/smoke.raku -o smoke-native.exe
          if ($LASTEXITCODE -ne 0) { exit 1 }
          .\smoke-native.exe
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Smoke test --exe (Windows, MinGW-w64)
        if: matrix.mingw == true
        shell: msys2 {0}
        env:
          CXX: g++
        run: |
          build/rakupp.exe --exe tools/smoke.raku -o smoke-native.exe
          ./smoke-native.exe

      # Byte-for-byte checks of every example + showcase against t/expected/,
      # plus live pastebin/chat servers. POSIX only: the server tests background
      # a process through the shell and stop it with pkill. The goldens are
      # arch-portable (exact int/Rat, IEEE basic ops, correctly-rounded sqrt).
      - name: Example & showcase suite (POSIX)
        if: runner.os != 'Windows'
        run: build/rakupp t/run.raku

      # Package the --exe-capable install layout: bin/rakupp, lib/librakupp_rt.a,
      # include/rakupp/*.h (main.cpp's findRuntime() expects exactly this).
      - name: Install layout
        if: matrix.mingw != true
        run: cmake --install build --config Release --prefix dist/rakupp

      - name: Install layout (MinGW-w64)
        if: matrix.mingw == true
        shell: msys2 {0}
        run: cmake --install build --prefix dist/rakupp

      - name: Package (POSIX)
        if: runner.os != 'Windows'
        run: |
          cp README.md LICENSE dist/rakupp/ 2>/dev/null || true
          tar -C dist -czf rakupp-${{ matrix.name }}.tar.gz rakupp
          if command -v shasum >/dev/null; then
            shasum -a 256 rakupp-${{ matrix.name }}.tar.gz > rakupp-${{ matrix.name }}.tar.gz.sha256
          else
            sha256sum rakupp-${{ matrix.name }}.tar.gz > rakupp-${{ matrix.name }}.tar.gz.sha256
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item README.md,LICENSE dist\rakupp\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\rakupp\* -DestinationPath rakupp-${{ matrix.name }}.zip
          (Get-FileHash rakupp-${{ matrix.name }}.zip -Algorithm SHA256).Hash | Out-File -Encoding ascii rakupp-${{ matrix.name }}.zip.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: rakupp-${{ matrix.name }}
          path: rakupp-${{ matrix.name }}.*
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: rakupp-${{ matrix.name }}.*

  # Raku.js: the interpreter compiled to WebAssembly (rakujs/build.sh). Ships two
  # release assets so users don't need Emscripten:
  #   - rakujs-<tag>.zip        the reusable build + playground (embed anywhere)
  #   - showcase-web-<tag>.zip  the browser showcase apps with the wasm already
  #                             embedded — unzip and open index.html (no server)
  # Tag-only (+ manual dispatch): the em++ -Oz compile costs a few minutes, so
  # ordinary pushes don't pay it.
  wasm:
    name: wasm (Raku.js)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      # Native rakupp — build.sh runs it (gen-examples.raku) to regenerate the
      # playground's examples.js from examples/*.raku.
      - name: Build native rakupp (for examples.js)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j 4

      # Cached toolchain, so no ~1 GB emsdk bootstrap that build.sh does locally.
      # 'latest' mirrors build.sh's own `emsdk install latest`.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Build Raku.js (WebAssembly)
        run: rakujs/build.sh

      # Embed the wasm as base64 + inline the showcase sources into showcase/web/lib/,
      # so the apps in that folder open straight from disk.
      - name: Bundle the browser showcases
        run: showcase/web/bundle.sh

      - name: Package
        run: |
          tag="${GITHUB_REF_NAME:-dev}"
          # 1) reusable Raku.js build + playground (drop into a site's /playground/)
          ( cd rakujs/playground &&
            zip -q -X "$GITHUB_WORKSPACE/rakujs-$tag.zip" \
                index.html worker.js rakujs.js rakujs.wasm examples.js )
          # 2) ready-to-open showcase apps: wasm already embedded in web/lib/
          zip -q -X -r "rakujs-showcase-web-$tag.zip" showcase/web \
              -x 'showcase/web/.gitignore' '*.DS_Store'
          for f in "rakujs-$tag.zip" "rakujs-showcase-web-$tag.zip"; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -lh rakujs-*.zip*

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: rakujs-wasm
          path: rakujs-*.zip*
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: rakujs-*.zip*

  # The Linux release binary above is built with Clang (faster); this job keeps
  # GCC compiling cleanly too — it's what most Linux users' `cmake --build` uses.
  gcc-portability:
    name: linux-gcc (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure (GCC)
        env: { CC: gcc, CXX: g++ }
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j 4
      - name: Smoke test
        run: build/rakupp tools/smoke.raku
